services:
  server:
    image: server
    build:
      context: server
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: production
    env_file:
      - server/.env
    ports:
      - 5000:5000
  client:
    build:
      context: client
      dockerfile: ./Dockerfile
    env_file:
      - client/.env
    ports:
      - 5173:5173
  mongodb:
      image: mongodb/mongodb-community-server:latest
      container_name: mongodb
      restart: unless-stopped
      ports:
          - 27017:27017
      volumes:
          - mongodb:/data/db

volumes:
    mongodb:
        external: true