apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
spec:
  replicas: 3
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: hashimaliii/client:v1.0
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: client-svc
spec:
  type: LoadBalancer # Exposed so you can visit it in browser
  selector:
    app: client
  ports:
    - port: 80
      targetPort: 5173