apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: hashimaliii/server:v1.0
          env:
            - name: MONGO_URI
              value: "mongodb://mongo-0.mongo:27017,mongo-1.mongo:27017,mongo-2.mongo:27017/mydatabase?replicaSet=rs0"
            - name: PORT
              value: "5000"
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: server-svc
spec:
  type: ClusterIP # Internal only; frontend talks to this
  selector:
    app: server
  ports:
    - port: 5000
      targetPort: 5000